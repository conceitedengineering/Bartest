<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Simulation - PlayHTML</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bar-container">
        <!-- Bar SVG Background -->
        <img src="assets/base-bar.svg" alt="Bar" class="bar-background" />
        
        <!-- Cursor Selector -->
        <div id="cursorSelector" class="cursor-selector">
            <h3>Select Your Cursor</h3>
            <div class="cursor-options" id="cursorOptions">
                <!-- Cursor options will be populated by script -->
            </div>
        </div>
        
        <!-- Cigarette Element -->
        <div id="cigarette" class="cigarette-element">
            <!-- Cigarette will be rendered here -->
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
